# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the OS, Python version, and other tools you might need
build:
  os: ubuntu-24.04
  tools:
    python: "3.13"

# Build documentation with Sphinx. Our conf.py lives in docs/source/,
# not docs/, so point at it explicitly.
sphinx:
  configuration: docs/source/conf.py

# Install the docs toolchain (Sphinx + theme) and the package itself.
# The package install is required because conf.py uses sphinx.ext.autodoc,
# which imports oryxflow (and its deps) to generate the API pages.
python:
  install:
    - requirements: docs/requirements.txt
    - method: pip
      path: .
