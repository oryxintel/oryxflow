# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details
#
# The docs moved from Sphinx/reStructuredText to MkDocs (Material). Primary hosting is
# Cloudflare Pages (see .github/workflows/docs.yml); this config keeps the existing
# readthedocs.io URL building the same MkDocs site as a mirror.

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

# Build with MkDocs instead of Sphinx.
mkdocs:
  configuration: mkdocs.yml

# Install the MkDocs toolchain and the package itself (the API Reference page
# introspects oryxflow via mkdocstrings, so it must be importable).
python:
  install:
    - requirements: docs/requirements-docs.txt
    - method: pip
      path: .
