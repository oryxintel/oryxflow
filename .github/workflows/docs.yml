name: Docs

# Build the MkDocs site (running the documentation-example tests first) and publish it
# to Cloudflare Pages. Runs on pushes to main that touch the docs, the library, or this
# workflow; can also be triggered by hand.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'oryxflow/**'
      - 'scripts/build_docs.py'
      - 'docs/requirements-docs.txt'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'oryxflow/**'
      - 'scripts/build_docs.py'
      - 'docs/requirements-docs.txt'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so mkdocs-git-revision-date-localized stamps real commit dates
          # (and correct sitemap <lastmod>) instead of the CI build time.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r docs/requirements-docs.txt

      - name: Build docs + run doc-example tests
        # --check fails if the committed tests/test_docs_*.py are stale vs the Markdown.
        run: python scripts/build_docs.py --check

      # Deploy only on pushes to main (not on PRs, which just build to validate).
      - name: Publish to Cloudflare Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=oryxflow-docs --branch=main
